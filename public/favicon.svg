<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020617"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f3ff"/>
      <stop offset="100%" style="stop-color:#38bdf8"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="100" height="100" rx="18" fill="url(#bg)"/>
  <!-- Accent border -->
  <rect width="100" height="100" rx="18" fill="none" stroke="#00f3ff" stroke-width="2" opacity="0.3"/>
  <!-- "RK" monogram -->
  <text
    x="50"
    y="67"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="44"
    font-weight="800"
    text-anchor="middle"
    fill="url(#text-grad)"
    letter-spacing="-2"
  >RK</text>
  <!-- Decorative bottom line -->
  <line x1="22" y1="78" x2="78" y2="78" stroke="#00f3ff" stroke-width="1.5" opacity="0.4"/>
</svg>
